<div class="manage-page">
  <div class="expense-info">
    <div class="expense-panel">
      <div class="date-header">
        <button class="date-nav" (click)="previousDay()">◀</button>

        <span class="date-title">
          {{ getDateLabel() }}
        </span>

        <button class="date-nav" (click)="nextDay()">▶</button>
      </div>

      <div class="summary-cards">
        <button class="clear-btn" (click)="clearAllTransactions()">Clear Transactions</button>
        <div class="card balance">
          <div class="card-title">Balance</div>
          <div class="card-value">₹{{ balance }}</div>
        </div>

        <div class="card income">
          <div class="card-title">Income</div>
          <div class="card-value">₹{{ totalIncome }}</div>
        </div>

        <div class="card expenses">
          <div class="card-title">Expenses</div>
          <div class="card-value">₹{{ totalExpenses }}</div>
        </div>
      </div>

      <table class="expense-table">
        <thead>
          <tr>
            <th>Category</th>
            <th>Title</th>
            <th>Amount</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let t of transactions" class="transaction-row" [ngClass]="{
              'expense-row': t.type === 'spend',
              'earning-row': t.type === 'earn',
            }">
            <td class="category-cell">
              <span class="category-dot" [style.background]="getCategoryColor(t.category)"></span>

              {{ t.category }}
            </td>
            <td>{{ t.title }}</td>
            <td class="amount-cell">
              {{ t.amount }}

              <span class="actions">
                <button (click)="editTransaction(t)">✏️</button>
                <button (click)="deleteTransaction(t)">🗑️</button>
              </span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="expense-panel"><app-pie-chart [expenses]="dailyExpenses" /></div>
  </div>
  <div class="options">
    <i id="minus-option" (click)="openPopup('spend')" class="fa-solid fa-minus"></i>
    <i id="plus-option" (click)="openPopup('earn')" class="fa-solid fa-plus"></i>
  </div>
</div>

<div class="popup-overlay" *ngIf="showPopup">
  <div class="popup">
    <h1 *ngIf="popupType === 'spend'">Record Expense</h1>
    <h1 *ngIf="popupType === 'earn'">Record Earning</h1>

    <form (ngSubmit)="submitForm()" class="popup-form">
      <label>
        Category
        <select [(ngModel)]="formData.category" name="category" required>
          <option value="" disabled selected>Select category</option>

          <option *ngFor="let c of settingsService.categories" [value]="c.name">
            {{ c.name }}
          </option>
        </select>
      </label>

      <label>
        Title
        <input type="text" [(ngModel)]="formData.title" name="title" required />
      </label>

      <label>
        Amount
        <input type="number" [(ngModel)]="formData.amount" name="amount" required />
      </label>

      <div class="popup-actions">
        <button type="button" (click)="closePopup()">Cancel</button>
        <button class="primary" type="submit">Confirm</button>
      </div>
    </form>
  </div>
</div>
